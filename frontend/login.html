<!DOCTYPE html>
<html>
<head>
    <title>登录 - QYmail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📩 QYmail</h1>
            <div class="buttons">
                <button onclick="window.location.href='index.html'">首页</button>
                <button onclick="window.location.href='register.html'">注册</button>
            </div>
        </div>
        <div class="card">
            <h2>登录 QYmail</h2>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button onclick="login()">登录</button>
            <p id="msg" style="margin-top: 20px; color: #e63946;"></p>
        </div>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (!username || !password) {
                msg.textContent = '请填写完整信息！';
                return;
            }

            // 对接 Go 后端登录接口
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);

            try {
                const response = await fetch('http://127.0.0.1:8080/api/login', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    msg.textContent = '登录成功！';
                    // 保存邮箱到本地
                    localStorage.setItem('qyemail', result.email);
                    setTimeout(() => {
                        window.location.href = 'mailbox.html';
                    }, 1000);
                } else {
                    msg.textContent = '登录失败：' + result.message;
                }
            } catch (error) {
                msg.textContent = '连接失败，请确保后端已启动！';
            }
        }
    </script>
</body>
</html>
