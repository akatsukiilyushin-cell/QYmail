<!DOCTYPE html>
<html>
<head>
    <title>注册 - QYmail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📩 QYmail</h1>
            <div class="buttons">
                <button onclick="window.location.href='index.html'">首页</button>
                <button onclick="window.location.href='login.html'">登录</button>
            </div>
        </div>
        <div class="card">
            <h2>注册 QYmail</h2>
            <!-- 修复：标准表单 + 正确传参 -->
            <input type="text" id="username" placeholder="输入用户名" autocomplete="off">
            <input type="password" id="password" placeholder="输入密码" autocomplete="off">
            <button onclick="register()">立即注册</button>
            <p id="msg" style="margin-top: 20px; color: #e63946;"></p>
        </div>
    </div>

    <script>
        // 修复后的注册函数（100%对接后端）
        async function register() {
            let username = document.getElementById('username').value.trim();
            let password = document.getElementById('password').value.trim();
            let msg = document.getElementById('msg');

            // 前端校验
            if(!username || !password){
                msg.innerText = "❌ 用户名和密码都不能为空！";
                return;
            }

            msg.innerText = "⏳ 正在注册中...";

            try {
                // 关键修复：正确发送POST请求
                let res = await fetch("http://127.0.0.1:8080/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });

                let data = await res.json();
                if(data.success){
                    msg.innerText = `✅ 注册成功！你的邮箱：${data.email}`;
                    // 2秒后跳登录
                    setTimeout(()=>{window.location.href="login.html"},2000);
                }else{
                    msg.innerText = "❌ "+data.message;
                }
            } catch (error) {
                msg.innerText = "❌ 连接后端失败";
                console.log(error);
            }
        }
    </script>
</body>
</html>
