<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QYmail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        :root {
            --main-red: #d90429;
            --light-red: #ef233c;
            --bg-deep: #0a0a0a;
            --bg-card: #121212;
            --bg-panel: #1a1a1a;
            --text-white: #fff;
            --text-gray: #b0b0b0;
            --border-dark: #2a2a2a;
        }
        body { background-color: var(--bg-deep); color: var(--text-white); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--main-red); border-radius: 3px; }

        /* 顶部导航 */
        .top-header {
            height: 60px; background: var(--bg-deep); padding: 0 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-dark);
        }
        .header-logo { font-size: 28px; font-weight: 700; }
        .header-logo span { color: var(--main-red); }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 50%; background: transparent; border: none;
            color: var(--text-gray); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: var(--bg-panel); color: var(--text-white); }

        /* 红色标签栏 */
        .tab-nav {
            height: 50px; background: var(--main-red);
            display: flex; align-items: center; justify-content: center; gap: 80px;
        }
        .tab-btn {
            height: 100%; padding: 0 20px; background: transparent; border: none;
            color: white; font-size: 18px; font-weight: 500; cursor: pointer; position: relative;
        }
        .tab-btn.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #ffc107;
        }

        /* 主体三栏布局 */
        .main-container { flex-grow: 1; display: flex; overflow: hidden; }
        
        /* 左栏：联系人 */
        .sidebar { flex: 0 0 240px; background: var(--bg-card); border-right: 1px solid var(--border-dark); overflow-y: auto; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border-dark); display: flex; justify-content: space-between; align-items: center; }
        .list-item { padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; border-bottom: 1px solid #1e1e1e; }
        .list-item:hover { background: var(--bg-panel); }
        .list-item.active { background: var(--light-red); }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--main-red), #7a0416);
            display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; flex-shrink: 0;
        }
        .item-info { flex-grow: 1; overflow: hidden; }
        .item-name { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-sub { font-size: 12px; color: var(--text-gray); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 中栏：邮件列表（核心突出） */
        .mail-list { flex: 1; background: var(--bg-deep); border-right: 1px solid var(--border-dark); overflow-y: auto; display: flex; flex-direction: column; min-width: 400px; }
        .toolbar { padding: 12px 16px; border-bottom: 1px solid var(--border-dark); display: flex; gap: 12px; position: sticky; top: 0; background: var(--bg-deep); z-index: 10; }
        .btn {
            padding: 6px 12px; background: transparent; border: 1px solid #333; border-radius: 4px;
            color: var(--text-gray); font-size: 12px; cursor: pointer;
        }
        .btn:hover { border-color: var(--main-red); color: var(--light-red); }

        /* 右栏：邮件预览 */
        .preview-panel { flex: 0 0 400px; background: var(--bg-deep); overflow: hidden; display: flex; flex-direction: column; }
        .preview-header { padding: 16px; background: var(--bg-card); border-bottom: 1px solid var(--border-dark); display: flex; justify-content: space-between; }
        .preview-body { flex-grow: 1; padding: 20px; background: var(--bg-card); overflow-y: auto; }
        .empty-state { height: 200px; display: flex; align-items: center; justify-content: center; color: #666; }

        /* 弹窗通用 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal {
            background: var(--bg-card); border-radius: 12px; width: 100%; max-width: 600px;
            border: 2px solid var(--main-red); box-shadow: 0 0 25px rgba(217,4,41,0.5); overflow: hidden;
        }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border-dark); display: flex; justify-content: space-between; }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 0 24px 24px; display: flex; justify-content: center; gap: 16px; }
        .input-group { margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .input-group label { font-size: 18px; font-weight: 500; width: 60px; }
        .input {
            flex-grow: 1; border: none; border-bottom: 1px solid #444; background: transparent;
            outline: none; font-size: 18px; color: white; padding: 6px 0;
        }
        .input:focus { border-color: var(--light-red); }
        textarea.input { border: 1px solid #444; border-radius: 4px; padding: 12px; min-height: 120px; width: 100%; }
        .btn-primary { background: white; color: black; padding: 12px 40px; border-radius: 6px; font-size: 18px; border: none; cursor: pointer; }
        .btn-danger { background: var(--main-red); color: white; padding: 12px 40px; border-radius: 6px; font-size: 18px; border: none; cursor: pointer; }
        .btn-primary:hover, .btn-danger:hover { transform: translateY(-2px); }
        .close-btn { background: transparent; border: none; color: #888; font-size: 22px; cursor: pointer; }
        .close-btn:hover { color: white; }
    </style>
</head>
<body>
    <!-- 顶部 -->
    <header class="top-header">
        <div class="header-logo"><span>Q</span>Ymail</div>
        <div class="header-right">
            <button class="icon-btn" onclick="openCompose()" title="写邮件">✏️</button>
            <div class="avatar" id="userAvatar">U</div>
        </div>
    </header>

    <!-- 标签栏 -->
    <nav class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('inbox')">收件箱</button>
        <button class="tab-btn" onclick="switchTab('sent')">已发送</button>
        <button class="tab-btn" onclick="switchTab('drafts')">草稿箱</button>
    </nav>

    <!-- 主体 -->
    <div class="main-container">
        <!-- 左：联系人 -->
        <aside class="sidebar" id="contactsSidebar">
            <div class="sidebar-header">
                <h3>联系人</h3>
                <button class="btn" onclick="openContactAdd()">+ 新增</button>
            </div>
            <div id="contactsList"><div class="empty-state">加载中...</div></div>
        </aside>

        <!-- 中：邮件列表 -->
        <div class="mail-list" id="mailListContainer">
            <div class="toolbar">
                <button class="btn" onclick="loadMails()">🔄 刷新</button>
                <button class="btn" onclick="openCompose()">✉️ 写邮件</button>
            </div>
            <div id="mailList"><div class="empty-state">点击刷新加载邮件</div></div>
        </div>

        <!-- 右：预览 -->
        <div class="preview-panel">
            <div class="preview-header">
                <h2>邮件预览</h2>
                <div style="display:flex;gap:8px;">
                    <button class="btn" onclick="replyMail()">回复</button>
                    <button class="btn" onclick="deleteMail()">删除</button>
                </div>
            </div>
            <div class="preview-body" id="previewBody">
                <div class="empty-state">选择邮件查看详情</div>
            </div>
        </div>
    </div>

    <!-- 写邮件弹窗 -->
    <div class="modal-overlay" id="composeModal">
        <div class="modal">
            <div class="modal-header">
                <h2>写邮件</h2>
                <button class="close-btn" onclick="closeModal('composeModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>收件人</label>
                    <input type="text" class="input" id="composeTo" placeholder="收件人邮箱">
                </div>
                <div class="input-group">
                    <label>主题</label>
                    <input type="text" class="input" id="composeSubject" placeholder="邮件主题">
                </div>
                <div style="margin-bottom:20px;">
                    <label style="font-size:18px;font-weight:500;display:block;margin-bottom:12px;">正文</label>
                    <textarea class="input" id="composeContent"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="sendEmail()">发送</button>
                <button class="btn-danger" onclick="closeModal('composeModal')">取消</button>
            </div>
        </div>
    </div>

    <!-- 联系人弹窗 -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal" style="max-width:500px;">
            <div class="modal-header">
                <h2 id="contactTitle">新增联系人</h2>
                <button class="close-btn" onclick="closeModal('contactModal')">×</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editContactId">
                <div class="input-group" style="display:block;">
                    <label style="display:block;margin-bottom:8px;">姓名</label>
                    <input type="text" class="input" id="contactName" placeholder="联系人姓名" style="width:100%;border:1px solid #333;padding:10px;border-radius:4px;">
                </div>
                <div class="input-group" style="display:block;">
                    <label style="display:block;margin-bottom:8px;">邮箱</label>
                    <input type="text" class="input" id="contactEmail" placeholder="联系人邮箱" style="width:100%;border:1px solid #333;padding:10px;border-radius:4px;">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-danger" onclick="closeModal('contactModal')">取消</button>
                <button class="btn-primary" onclick="saveContact()">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://127.0.0.1:8080";
        const userEmail = localStorage.getItem('qyemail') || 'test@test.com';
        let currentMailId = null;
        let currentMails = [];

        // 初始化
        document.getElementById('userAvatar').textContent = userEmail.charAt(0).toUpperCase();
        window.onload = function() {
            loadMails();
            loadContacts();
        };

        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadMails();
        }

        // ==================== 邮件功能 ====================
        async function loadMails() {
            const list = document.getElementById('mailList');
            list.innerHTML = '<div class="empty-state">加载中...</div>';
            try {
                const res = await fetch(`${API}/api/emails?user_email=${encodeURIComponent(userEmail)}`);
                const data = await res.json();
                const mails = data.emails || data.data || [];
                currentMails = mails;
                
                if(mails.length > 0) {
                    list.innerHTML = mails.map(m => `
                        <div class="list-item" onclick="viewMail(${m.id})">
                            <div class="avatar">${(m.from || 'U').charAt(0).toUpperCase()}</div>
                            <div class="item-info">
                                <div class="item-name">${m.from || '未知'}</div>
                                <div class="item-sub">${m.subject || m.preview || '无主题'}</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<div class="empty-state">暂无邮件</div>';
                }
            } catch(e) {
                console.error(e);
                list.innerHTML = '<div class="empty-state">加载失败，请确保后端已启动</div>';
            }
        }

        async function viewMail(id) {
            currentMailId = id;
            document.querySelectorAll('#mailList .list-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');

            const body = document.getElementById('previewBody');
            try {
                const res = await fetch(`${API}/api/detail?id=${id}&user_email=${encodeURIComponent(userEmail)}`);
                const data = await res.json();
                const m = data.data || data;
                body.innerHTML = `
                    <h3 style="margin-bottom:12px;font-size:20px;">${m.subject || '无主题'}</h3>
                    <p style="color:#aaa;margin-bottom:20px;">发件人：${m.from || '未知'}</p>
                    <div style="padding:16px;background:#1a1a1a;border-radius:6px;line-height:1.8;">
                        ${m.content || '无内容'}
                    </div>
                `;
            } catch(e) {
                body.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function openCompose() {
            document.getElementById('composeTo').value = '';
            document.getElementById('composeSubject').value = '';
            document.getElementById('composeContent').value = '';
            document.getElementById('composeModal').style.display = 'flex';
        }

        async function sendEmail() {
            const to = document.getElementById('composeTo').value;
            const subject = document.getElementById('composeSubject').value;
            const content = document.getElementById('composeContent').value;
            if(!to || !subject) return alert('请填写收件人和主题');

            try {
                const params = new URLSearchParams();
                params.append('from_email', userEmail);
                params.append('to_email', to);
                params.append('subject', subject);
                params.append('content', content);

                const res = await fetch(`${API}/api/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                const data = await res.json();
                if(data.success) {
                    alert('发送成功！');
                    closeModal('composeModal');
                    loadMails();
                } else {
                    alert('发送失败：' + (data.message || ''));
                }
            } catch(e) {
                alert('发送失败');
            }
        }

        function replyMail() {
            if(!currentMailId) return alert('请先选择邮件');
            openCompose();
        }

        async function deleteMail() {
            if(!currentMailId) return alert('请先选择邮件');
            if(!confirm('确定删除？')) return;
            
            try {
                const params = new URLSearchParams();
                params.append('id', currentMailId);
                params.append('user_email', userEmail);
                await fetch(`${API}/api/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                alert('删除成功！');
                currentMailId = null;
                document.getElementById('previewBody').innerHTML = '<div class="empty-state">选择邮件查看详情</div>';
                loadMails();
            } catch(e) {
                alert('删除失败');
            }
        }

        // ==================== 联系人功能 ====================
        async function loadContacts() {
            const list = document.getElementById('contactsList');
            try {
                const res = await fetch(`${API}/api/contact/list?user_email=${encodeURIComponent(userEmail)}`);
                const data = await res.json();
                const contacts = data.contacts || data.data || [];
                
                if(contacts.length > 0) {
                    list.innerHTML = contacts.map(c => `
                        <div class="list-item" onclick="contactClick('${c.email}')">
                            <div class="avatar">${(c.name || 'U').charAt(0).toUpperCase()}</div>
                            <div class="item-info">
                                <div class="item-name">${c.name || '未知'}</div>
                                <div class="item-sub">${c.email || ''}</div>
                            </div>
                            <div style="opacity:0;transition:0.2s;" class="contact-actions">
                                <button class="icon-btn" onclick="event.stopPropagation();editContact(${c.id},'${c.name}','${c.email}')" style="width:24px;height:24px;">✏️</button>
                                <button class="icon-btn" onclick="event.stopPropagation();deleteContact(${c.id})" style="width:24px;height:24px;">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                    
                    // 修复hover显示操作按钮
                    document.querySelectorAll('#contactsList .list-item').forEach(item => {
                        item.addEventListener('mouseenter', () => {
                            item.querySelector('.contact-actions').style.opacity = '1';
                        });
                        item.addEventListener('mouseleave', () => {
                            item.querySelector('.contact-actions').style.opacity = '0';
                        });
                    });
                } else {
                    list.innerHTML = '<div class="empty-state">暂无联系人</div>';
                }
            } catch(e) {
                list.innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        function contactClick(email) {
            openCompose();
            document.getElementById('composeTo').value = email;
        }

        function openContactAdd() {
            document.getElementById('contactTitle').textContent = '新增联系人';
            document.getElementById('editContactId').value = '';
            document.getElementById('contactName').value = '';
            document.getElementById('contactEmail').value = '';
            document.getElementById('contactModal').style.display = 'flex';
        }

        function editContact(id, name, email) {
            document.getElementById('contactTitle').textContent = '编辑联系人';
            document.getElementById('editContactId').value = id;
            document.getElementById('contactName').value = name;
            document.getElementById('contactEmail').value = email;
            document.getElementById('contactModal').style.display = 'flex';
        }

        async function saveContact() {
            const id = document.getElementById('editContactId').value;
            const name = document.getElementById('contactName').value;
            const email = document.getElementById('contactEmail').value;
            if(!name || !email) return alert('请填写姓名和邮箱');

            try {
                const params = new URLSearchParams();
                params.append('user_email', userEmail);
                params.append('contact_name', name);
                params.append('contact_email', email);
                
                let url = `${API}/api/contact/add`;
                if(id) {
                    url = `${API}/api/contact/edit`;
                    params.append('id', id);
                }

                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                alert('保存成功！');
                closeModal('contactModal');
                loadContacts();
            } catch(e) {
                alert('保存失败');
            }
        }

        async function deleteContact(id) {
            if(!confirm('确定删除？')) return;
            try {
                const params = new URLSearchParams();
                params.append('id', id);
                params.append('user_email', userEmail);
                await fetch(`${API}/api/contact/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });
                alert('删除成功！');
                loadContacts();
            } catch(e) {
                alert('删除失败');
            }
        }

        // 通用关闭弹窗
        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // 点击遮罩关闭
        window.onclick = function(e) {
            if(e.target.classList.contains('modal-overlay')) {
                e.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
